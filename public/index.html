<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hearth · Dienste</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/css/style.css" />
    <script src="/js/i18n.js"></script>
    <style>
      /* Hero */
      .hero {
        padding: 44px 0 24px;
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
      }
      .hero h1 {
        font-family: var(--font-display);
        font-size: clamp(28px, 5vw, 42px);
        font-weight: 800;
        letter-spacing: -0.03em;
        line-height: 1;
      }
      .stat-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
        margin-top: 10px;
      }
      .stat-row .pill { background: var(--panel); }

      /* Square card grid */
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 14px;
        padding-bottom: 60px;
      }

      /* Square aspect-ratio card */
      .app-card {
        aspect-ratio: 1 / 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        /* bottom padding = open-bar height so content never slides behind it */
        padding: 16px 12px 38px;
        border-radius: var(--radius);
        background: var(--panel);
        border: 1px solid var(--border);
        transition: all 0.18s ease;
        position: relative;
        overflow: hidden;
        text-decoration: none;
        color: inherit;
      }
      .app-card::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: inherit;
        border: 1px solid transparent;
        pointer-events: none;
        transition: border-color 0.18s ease;
      }
      .app-card:hover {
        transform: translateY(-2px);
        border-color: var(--border-bright);
        box-shadow: var(--shadow);
      }
      .app-card:hover::after { border-color: var(--accent-dim); }

      /* Card body — icon, name, status */
      .app-body {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        text-align: center;
        width: 100%;
        min-height: 0; /* allow shrinking */
      }
      .app-icon {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        display: grid;
        place-items: center;
        font-size: 24px;
        background: var(--panel-2);
        border: 1px solid var(--border);
        flex-shrink: 0;
        overflow: hidden;
      }
      .app-icon img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .app-name {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: 14px;
        letter-spacing: -0.01em;
        line-height: 1.2;
        word-break: break-word;
        max-width: 100%;
      }

      /* Open bar — fixed at bottom of card */
      .app-open-bar {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 9px 0;
        border-top: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
        font-size: 12.5px;
        font-weight: 700;
        color: var(--accent);
        background: var(--panel);
        transition: background 0.15s ease;
      }
      .app-card:hover .app-open-bar {
        background: var(--accent-glow);
      }

      /* Stopped card */
      .app-card.stopped .app-open-bar { color: var(--text-faint); }
      .app-card.stopped .app-icon    { opacity: 0.5; }
      .app-card.stopped .app-name    { color: var(--text-dim); }

      /* Reload button */
      .reload { cursor: pointer; }
      .reload.spin svg { animation: spin 0.8s linear; }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* Language selector */
      .lang-select {
        font-family: var(--font-mono);
        font-size: 12px;
        padding: 5px 8px;
        background: var(--panel);
        border: 1px solid var(--border-bright);
        border-radius: var(--radius-sm);
        color: var(--text-dim);
        cursor: pointer;
        transition: border-color 0.15s;
      }
      .lang-select:focus { outline: none; border-color: var(--accent-dim); }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="wrap topbar-inner">
        <div class="brand">
          <span class="flame">▲</span>
          <span>Hearth <small>Home Server</small></span>
        </div>
        <div class="spacer"></div>
        <select class="lang-select" id="lang-select" title="Language">
          <option value="de">🇩🇪 DE</option>
          <option value="en">🇬🇧 EN</option>
          <option value="ro">🇷🇴 RO</option>
          <option value="fr">🇫🇷 FR</option>
          <option value="es">🇪🇸 ES</option>
          <option value="it">🇮🇹 IT</option>
          <option value="pl">🇵🇱 PL</option>
          <option value="nl">🇳🇱 NL</option>
          <option value="pt">🇵🇹 PT</option>
        </select>
        <button class="btn ghost sm reload" id="reload" data-i18n-title="nav.refresh" title="Aktualisieren">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-2.6-6.4M21 4v4h-4"/></svg>
          <span data-i18n="nav.refresh">Aktualisieren</span>
        </button>
        <a class="btn sm" href="/admin" data-i18n="nav.adminLogin">Admin-Login →</a>
      </div>
    </header>

    <div class="wrap">
      <section class="hero">
        <div>
          <h1 data-i18n="guest.welcome">Willkommen</h1>
          <div class="stat-row" id="stats"></div>
        </div>
      </section>

      <section class="grid" id="grid">
        <div class="empty"><div class="big">⟳</div><span data-i18n="guest.loading">Lade Dienste…</span></div>
      </section>
    </div>

    <div id="toast"></div>
    <script src="/js/common.js"></script>
    <script>
      // Apply language from server setting first, then localStorage override
      api('GET', '/api/lang').then(d => {
        const saved = localStorage.getItem('hearth-lang') || d.lang || 'de';
        applyLang(saved);
        const sel = document.getElementById('lang-select');
        if (sel) sel.value = saved;
      }).catch(() => {});

      document.getElementById('lang-select').addEventListener('change', function () {
        applyLang(this.value);
        localStorage.setItem('hearth-lang', this.value);
      });
    </script>
    <script src="/js/guest.js"></script>
  </body>
</html>
