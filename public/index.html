<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hearth · Dienste</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/css/style.css" />
    <script src="/js/i18n.js"></script>
    <style>
      .hero {
        padding: 54px 0 30px;
      }
      .hero h1 {
        font-family: var(--font-display);
        font-size: clamp(34px, 6vw, 56px);
        font-weight: 800;
        letter-spacing: -0.03em;
        line-height: 1;
      }
      .hero h1 .accent {
        color: var(--accent);
      }
      .hero p {
        color: var(--text-dim);
        margin-top: 14px;
        font-size: 16px;
        max-width: 520px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(248px, 1fr));
        gap: 16px;
        padding-bottom: 70px;
      }
      .app-card {
        display: flex;
        flex-direction: column;
        gap: 14px;
        padding: 20px;
        border-radius: var(--radius);
        background: var(--panel);
        border: 1px solid var(--border);
        transition: all 0.18s ease;
        position: relative;
        overflow: hidden;
      }
      .app-card::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: inherit;
        border: 1px solid transparent;
        transition: border-color 0.18s ease;
        pointer-events: none;
      }
      .app-card:hover {
        transform: translateY(-3px);
        border-color: var(--border-bright);
        box-shadow: var(--shadow);
      }
      .app-card:hover::after {
        border-color: var(--accent-dim);
      }
      .app-top {
        display: flex;
        align-items: center;
        gap: 13px;
      }
      .app-icon {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        display: grid;
        place-items: center;
        font-size: 24px;
        background: var(--panel-2);
        border: 1px solid var(--border);
        flex-shrink: 0;
        overflow: hidden;
      }
      .app-icon img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .app-name {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: 17px;
        letter-spacing: -0.01em;
      }
      .app-desc {
        color: var(--text-dim);
        font-size: 13px;
        line-height: 1.45;
        flex: 1;
        word-break: break-word;
      }
      .app-foot {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .app-foot .open {
        font-size: 13px;
        font-weight: 700;
        color: var(--accent);
        display: inline-flex;
        align-items: center;
        gap: 5px;
      }
      .stat-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 22px;
      }
      .stat-row .pill {
        background: var(--panel);
      }
      .reload {
        cursor: pointer;
      }
      .reload.spin svg {
        animation: spin 0.8s linear;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="wrap topbar-inner">
        <div class="brand">
          <span class="flame">▲</span>
          <span>Hearth <small>Home Server</small></span>
        </div>
        <div class="spacer"></div>
        <button class="btn ghost sm reload" id="reload" title="Aktualisieren" data-i18n-title="nav.refresh">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-2.6-6.4M21 4v4h-4"/></svg>
          <span data-i18n="nav.refresh">Aktualisieren</span>
        </button>
        <a class="btn sm" href="/admin" data-i18n="nav.adminLogin">Admin-Login →</a>
      </div>
    </header>

    <div class="wrap">
      <section class="hero">
        <h1>Deine <span class="accent">Dienste.</span><br />Ein Klick entfernt.</h1>
        <p data-i18n="hero.subtitle">
          Übersicht aller laufenden Anwendungen auf diesem Home Server. Kein Login
          nötig – einfach die gewünschte App anklicken.
        </p>
        <div class="stat-row" id="stats"></div>
      </section>

      <section class="grid" id="grid">
        <div class="empty"><div class="big">⟳</div>Lade Dienste…</div>
      </section>
    </div>

    <div id="toast"></div>
    <script src="/js/common.js"></script>
    <script>
      api('GET', '/api/lang').then(d => applyLang(d.lang)).catch(() => {});
    </script>
    <script src="/js/guest.js"></script>
  </body>
</html>
