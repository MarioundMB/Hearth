services:
  hearth:
    build: .
    container_name: hearth-dev
    restart: "no"
    ports:
      - "4500:4500"
      - "8080:80"    # Proxy auf 8080 um Konflikt mit lokalem Port 80 zu vermeiden
    environment:
      - FILES_ROOT=/mnt/data
      - PORT=4500
      - PROXY_PORT=80
    labels:
      - "hearth.self=true"
      - "hearth.hide=true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - hearth-data:/mnt/data

  hearth-firewall:
    image: alpine:latest
    container_name: hearth-firewall-dev
    network_mode: host
    privileged: true
    restart: "no"
    command: >
      sh -c "apk add --no-cache ufw iptables ip6tables &&
             ufw --force enable &&
             tail -f /dev/null"
    labels:
      - "hearth.self=true"
      - "hearth.hide=true"

volumes:
  hearth-data:
