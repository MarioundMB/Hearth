services:
  hearth:
    build: .
    container_name: hearth-dev
    restart: "no"
    ports:
      - "4500:4500"   # Admin panel
      - "3000:3000"   # Guest view
      - "8080:80"     # Reverse Proxy (avoid conflict with local port 80)
    environment:
      - FILES_ROOT=/mnt/data
      - PORT=4500
      - GUEST_PORT=3000
      - PROXY_PORT=80
    labels:
      - "hearth.self=true"
      - "hearth.hide=true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - hearth-data:/mnt/data

  hearth-firewall:
    image: alpine:latest
    container_name: hearth-firewall-dev
    network_mode: host
    privileged: true
    restart: "no"
    command: >
      sh -c "apk add --no-cache ufw iptables ip6tables &&
             ufw --force enable &&
             tail -f /dev/null"
    labels:
      - "hearth.self=true"
      - "hearth.hide=true"

  # WireGuard VPN (local testing — no actual VPN tunnel)
  hearth-vpn:
    image: linuxserver/wireguard:latest
    container_name: hearth-vpn-dev
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin
      - SERVERURL=localhost
      - SERVERPORT=51820
      - PEERS=1
      - PEERDNS=auto
      - INTERNAL_SUBNET=10.13.13.0
      - LOG_CONFS=true
    volumes:
      - wireguard-config-dev:/config
      - /lib/modules:/lib/modules:ro
    ports:
      - "51820:51820/udp"
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    restart: "no"
    labels:
      - "hearth.self=true"
      - "hearth.hide=true"

volumes:
  hearth-data:
  wireguard-config-dev:
