services:
  hearth:
    build: .
    container_name: hearth
    restart: unless-stopped
    ports:
      - "${PORT:-4500}:${PORT:-4500}"   # Admin-UI
      - "${PROXY_PORT:-80}:80"          # Reverse Proxy
    environment:
      - PORT=${PORT:-4500}
      - PROXY_PORT=80
      - SESSION_SECRET=${SESSION_SECRET}
      - FILES_ROOT=/mnt/data
      # Admin-Zugangsdaten OPTIONAL – wenn nicht gesetzt, startet der Setup-Wizard
      # - ADMIN_USER=admin
      # - ADMIN_PASSWORD=meinPasswort
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DATA_DIR:-/srv/hearth-data}:/mnt/data
    labels:
      - "hearth.self=true"
      - "hearth.hide=true"

  # Privilegierter Firewall-Helfer (verwaltet ufw auf dem Host-Netzwerk)
  hearth-firewall:
    image: alpine:latest
    container_name: hearth-firewall
    network_mode: host
    privileged: true
    restart: unless-stopped
    command: >
      sh -c "apk add --no-cache ufw iptables ip6tables &&
             ufw --force enable &&
             tail -f /dev/null"
    labels:
      - "hearth.self=true"
      - "hearth.hide=true"
