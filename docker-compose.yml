services:
  hearth:
    build: .
    container_name: hearth
    restart: unless-stopped
    ports:
      - "${PORT:-4500}:${PORT:-4500}"
    environment:
      - PORT=${PORT:-4500}
      - SESSION_SECRET=${SESSION_SECRET}
      - FILES_ROOT=/mnt/data
      # Admin-Zugangsdaten OPTIONAL – wenn nicht gesetzt, startet der Setup-Wizard
      # beim ersten Aufruf und fragt nach Benutzername + Passwort.
      # - ADMIN_USER=admin
      # - ADMIN_PASSWORD=meinPasswort
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DATA_DIR:-/srv/hearth-data}:/mnt/data
    labels:
      - "hearth.self=true"
      - "hearth.hide=true"
