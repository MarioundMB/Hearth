user nginx;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

load_module /usr/lib/nginx/modules/ngx_stream_module.so;

events {
    worker_connections 1024;
}

# Hearth-generierte Streams (rohe TCP/UDP-Portweiterleitung)
stream {
    include /etc/nginx/hearth-streams/*.conf;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    access_log    off;
    sendfile      on;
    keepalive_timeout 65;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Per-Rule Traffic-Log Format
    log_format hearth_combined '$time_iso8601|$status|$request_method|$request_uri|$body_bytes_sent|$remote_addr|$http_user_agent';

    # WebSocket-Support für alle Proxy-Regeln
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Hearth-generierte HTTPS Proxy-Regeln
    include /etc/nginx/hearth-proxy/*.conf;

    # HTTP: ACME-Challenges durchlassen, alles andere → HTTPS
    server {
        listen 80 default_server;
        server_name _;
        location /.well-known/acme-challenge/ {
            root /var/www/acme;
            try_files $uri =404;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS-Fallback für unbekannte Domains
    server {
        listen 443 ssl default_server;
        server_name _;
        ssl_certificate     /etc/nginx/hearth-certs/_default/cert.pem;
        ssl_certificate_key /etc/nginx/hearth-certs/_default/key.pem;
        return 404 "Hearth Reverse Proxy – no rule for this domain.\n";
        add_header Content-Type text/plain;
    }
}
