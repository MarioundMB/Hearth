user nginx;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    access_log    off;
    sendfile      on;
    keepalive_timeout 65;

    # WebSocket-Support für alle Proxy-Regeln
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Hearth-generierte Proxy-Regeln
    include /etc/nginx/hearth-proxy/*.conf;

    # Fallback: kein passender Host
    server {
        listen 80 default_server;
        server_name _;
        return 404 "Hearth Reverse Proxy – no rule for this domain.\n";
        add_header Content-Type text/plain;
    }
}
